name: verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read # used for golangci-lint with 'only-new-issues' option

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: # define the types that will run
          - unit
          - integration
          - fuzz
        include: # add complete make target for each type
          - type: unit
            make-target: ci-unit
            upload-coverage: true
          - type: integration
            make-target: ci-integration
            upload-coverage: true
          - type: fuzz
            make-target: ci-fuzz
            upload-coverage: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: 'go.mod'

      - name: Run ${{ matrix.type }} tests
        run: make ${{ matrix.make-target }}

      - name: Upload coverage to Codecov
        if: matrix.upload-coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.type }}

  golangci:
    env:
      GOEXPERIMENT: "jsonv2"

    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: 'go.mod'

      # mise is the single version authority; install only golangci-lint from
      # mise.toml (the lint job needs nothing else) and let the lint action use
      # that binary (install-mode: none).
      # Only write the tool cache from main pushes so PRs don't pollute it.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          install_args: golangci-lint
          cache_save: ${{ github.event_name != 'pull_request' }}

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: none
